// ─── UPLOAD ──────────────────────────────────────────────────────────────────

function UploadScreen({ onComplete }) {
  const [phase, setPhase] = React.useState('idle'); // idle | dragging | uploading | analyzing
  const [progress, setProgress] = React.useState(0);

  const startUpload = () => {
    setPhase('uploading');
    let p = 0;
    const t = setInterval(() => {
      p += Math.random() * 18 + 4;
      if (p >= 100) { p = 100; clearInterval(t); setPhase('analyzing'); }
      setProgress(Math.min(p, 100));
    }, 200);
    setTimeout(() => onComplete(), 4800);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setPhase('dragging');
    setTimeout(startUpload, 300);
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <AppNav screen="upload" />
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 48 }}>
        {phase === 'idle' || phase === 'dragging' ? (
          <div onDragOver={(e) => { e.preventDefault(); setPhase('dragging'); }}
            onDragLeave={() => setPhase('idle')}
            onDrop={handleDrop}
            style={{ width: '100%', maxWidth: 600, border: `2px dashed ${phase === 'dragging' ? '#0D0D0D' : '#C8C8C8'}`, borderRadius: 4, padding: '80px 40px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 20, transition: 'border-color 180ms, background 180ms', background: phase === 'dragging' ? '#F0F0F0' : '#fff', cursor: 'default' }}>
            <div style={{ fontSize: 36, color: '#D0D0D0', lineHeight: 1 }}>↑</div>
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 18, fontWeight: 500, color: '#0D0D0D', marginBottom: 8 }}>Drop a pitch deck here</div>
              <div style={{ fontSize: 14, color: '#888' }}>PDF only · Max 50MB</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, width: '100%', maxWidth: 280 }}>
              <div style={{ flex: 1, height: 1, background: '#E0E0E0' }} />
              <span style={{ fontSize: 12, color: '#C0C0C0' }}>or</span>
              <div style={{ flex: 1, height: 1, background: '#E0E0E0' }} />
            </div>
            <MintBtn onClick={startUpload}>Choose File</MintBtn>
          </div>
        ) : (
          <div style={{ width: '100%', maxWidth: 480, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 32 }}>
            {phase === 'uploading' && (
              <>
                <div style={{ fontSize: 14, fontWeight: 500, color: '#888' }}>Uploading deck…</div>
                <div style={{ width: '100%', height: 2, background: '#E0E0E0', borderRadius: 1 }}>
                  <div style={{ width: `${progress}%`, height: '100%', background: '#B4FFB6', borderRadius: 1, transition: 'width 200ms' }} />
                </div>
                <div style={{ fontSize: 12, color: '#888' }}>{Math.round(progress)}%</div>
              </>
            )}
            {phase === 'analyzing' && (
              <>
                <PulseLoader />
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: 18, fontWeight: 500, color: '#0D0D0D', marginBottom: 6 }}>Analyzing deck…</div>
                  <div style={{ fontSize: 14, color: '#888' }}>Innovia is reviewing the pitch. This takes about 30 seconds.</div>
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function PulseLoader() {
  return (
    <div style={{ display: 'flex', gap: 8 }}>
      {[0,1,2].map(i => (
        <div key={i} style={{ width: 8, height: 8, borderRadius: '50%', background: '#B4FFB6', animation: `pulse 1.2s ${i * 0.2}s ease-in-out infinite` }} />
      ))}
      <style>{`@keyframes pulse { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.1)} }`}</style>
    </div>
  );
}

                return (
                  <button key={type} onClick={() => setFilterType(type)}
                    style={{ fontSize: 11, fontWeight: 500, color: active ? '#0D0D0D' : '#888', background: 'transparent', border: 'none', borderBottom: `2px solid ${active ? '#0D0D0D' : 'transparent'}`, padding: '6px 10px', cursor: 'pointer', transition: 'all 150ms', whiteSpace: 'nowrap' }}>
                    {label} {count > 0 && <span style={{ fontSize: 10, color: active ? '#0D0D0D' : '#B0B0B0' }}>{count}</span>}
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px', display: 'flex', flexDirection: 'column', gap: 10 }}>
            {(() => {
              let visible = filterType === 'all' ? obs : obs.filter(o => o.type === filterType);
              if (sortBySlide) visible = [...visible].sort((a, b) => a.slide - b.slide);
              return visible.map(o => (
                <ObservationCard key={o.id} obs={o} expandedReply={expandedReply} onExpandReply={setExpandedReply}
                  onRate={(id, r) => updateObs(id, { rating: r })}
                  onReply={(id, t) => updateObs(id, { reply: t })}
                  onSlideClick={scrollToSlide}
                />
              ));
            })()}
          </div>

          {/* Sticky footer */}
          <div style={{ padding: '16px 24px', borderTop: '1px solid #E0E0E0', background: '#fff', flexShrink: 0 }}>
            <div style={{ fontSize: 12, color: '#888', marginBottom: 12 }}>
              {obs.filter(o => o.rating !== null).length}/{obs.length} observations rated
            </div>
            <MintBtn onClick={onScore} style={{ width: '100%', justifyContent: 'center', padding: '12px 20px', fontSize: 14 }}>Generate Overall Score</MintBtn>
          </div>
        </div>
      </div>
    </div>
  );
}

function ObservationCard({ obs, expandedReply, onExpandReply, onRate, onReply, onSlideClick }) {
  const isExpanded = expandedReply === obs.id;
  const typeColor = TYPE_COLORS[obs.type] || '#F0F0F0';
  const typeFg = TYPE_FG[obs.type] || '#444';
  const [hovUp, setHovUp] = React.useState(false);
  const [hovDn, setHovDn] = React.useState(false);

  return (
    <div style={{ background: '#fff', border: '1px solid #E0E0E0', borderRadius: 4, overflow: 'hidden' }}>
      {/* Type stripe */}
      <div style={{ height: 3, background: typeColor }} />
      <div style={{ padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {/* Meta row */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 10, fontWeight: 600, color: typeFg, background: typeColor, borderRadius: 3, padding: '2px 7px', letterSpacing: '0.04em', textTransform: 'uppercase' }}>{obsTypeLabel(obs)}</span>
          <span onClick={() => onSlideClick(obs.slide - 1)} style={{ fontSize: 11, color: '#888', background: '#F4F4F4', borderRadius: 3, padding: '2px 7px', cursor: 'pointer', fontWeight: 500 }}>Slide {obs.slide}</span>
        </div>

        {/* Text */}
        <p style={{ fontSize: 13, color: '#0D0D0D', lineHeight: 1.55, fontWeight: 400 }}>{obs.text}</p>

        {/* Rating row */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 11, color: '#888', marginRight: 4 }}>Rate this observation</span>
          <button onClick={() => onRate(obs.id, obs.rating === 'up' ? null : 'up')}
            onMouseEnter={() => setHovUp(true)} onMouseLeave={() => setHovUp(false)}
            style={{ width: 28, height: 28, border: `1px solid ${obs.rating === 'up' ? '#0D0D0D' : '#E0E0E0'}`, borderRadius: 4, background: obs.rating === 'up' ? '#0D0D0D' : hovUp ? '#F4F4F4' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', transition: 'all 150ms', fontSize: 14 }}>
            <span style={{ color: obs.rating === 'up' ? '#B4FFB6' : '#888' }}>👍</span>
          </button>
          <button onClick={() => onRate(obs.id, obs.rating === 'dn' ? null : 'dn')}
            onMouseEnter={() => setHovDn(true)} onMouseLeave={() => setHovDn(false)}
            style={{ width: 28, height: 28, border: `1px solid ${obs.rating === 'dn' ? '#0D0D0D' : '#E0E0E0'}`, borderRadius: 4, background: obs.rating === 'dn' ? '#0D0D0D' : hovDn ? '#F4F4F4' : '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', transition: 'all 150ms', fontSize: 14 }}>
            <span style={{ color: obs.rating === 'dn' ? '#FFD6D6' : '#888' }}>👎</span>
          </button>

          {/* Reply toggle */}
          <button onClick={() => onExpandReply(isExpanded ? null : obs.id)}
            style={{ marginLeft: 'auto', fontSize: 11, color: '#888', background: 'transparent', border: 'none', cursor: 'pointer', fontWeight: 500 }}>
            {isExpanded ? '↑ Close' : '+ Reply'}
          </button>
        </div>

        {/* Inline reply */}
        {(isExpanded || obs.reply) && (
          <div style={{ borderTop: '1px solid #F0F0F0', paddingTop: 10 }}>
            <textarea
              value={obs.reply}
              onChange={e => onReply(obs.id, e.target.value)}
              onFocus={() => onExpandReply(obs.id)}
              placeholder="Add your notes…"
              rows={isExpanded ? 3 : 1}
              style={{ width: '100%', fontSize: 12, color: '#0D0D0D', background: '#F9F9F9', border: '1px solid #E8E8E8', borderRadius: 3, padding: '8px 10px', lineHeight: 1.5, transition: 'rows 200ms' }}
            />
          </div>
        )}
      </div>
    </div>
  );
}

// ─── SCORE SUMMARY ────────────────────────────────────────────────────────────

function ScoreSummaryScreen({ deal, onBack, tweaks }) {
  const [dims, setDims] = React.useState(SCORE_DIMENSIONS);
  const [finalNote, setFinalNote] = React.useState('');
  const [noteExpanded, setNoteExpanded] = React.useState(false);

  const ratesDim = (id, r) => setDims(prev => prev.map(d => d.id === id ? { ...d, rating: d.rating === r ? null : r } : d));

  const scoreColor = (s) => s >= 75 ? '#1a4d1c' : s >= 55 ? '#5a4000' : '#6b1a1a';
  const scoreBg = (s) => s >= 75 ? '#B4FFB6' : s >= 55 ? '#FFF3CD' : '#FFD6D6';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
      <AppNav screen="score" deal={deal} onDashboard={onBack} tweaks={tweaks} />
      <div style={{ flex: 1, overflowY: 'auto' }}>
        <div style={{ maxWidth: 760, margin: '0 auto', padding: '48px 40px' }}>

          {/* Back link */}
          <button onClick={onBack} style={{ fontSize: 13, color: '#888', background: 'none', border: 'none', cursor: 'pointer', marginBottom: 32, display: 'flex', alignItems: 'center', gap: 6 }}>
            ← Back to Deck
          </button>

          {/* Hero score */}
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 32, marginBottom: 40, paddingBottom: 40, borderBottom: '1px solid #E0E0E0' }}>
            <div style={{ flexShrink: 0 }}>
              <div style={{ fontSize: 11, fontWeight: 500, color: '#888', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 10 }}>Overall Score</div>
              <div style={{ fontSize: 80, fontWeight: 600, color: '#0D0D0D', lineHeight: 1, letterSpacing: '-0.04em' }}>74<span style={{ fontSize: 28, fontWeight: 400, color: '#C0C0C0' }}>/100</span></div>
            </div>
            <div style={{ flex: 1, paddingBottom: 8 }}>
              <p style={{ fontSize: 14, color: '#444', lineHeight: 1.65 }}>
                Meridian AI presents a compelling early-stage opportunity anchored by a strong founding team and meaningful early traction. The core product thesis is coherent, though market sizing and financial planning warrant deeper diligence. We recommend advancing to a partner call.
              </p>
            </div>
          </div>

          {/* Dimension breakdown */}
          <div style={{ marginBottom: 40 }}>
            <div style={{ fontSize: 11, fontWeight: 500, color: '#888', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 20 }}>Score Breakdown</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
              {dims.map((d, i) => (
                <DimensionRow key={d.id} dim={d} scoreColor={scoreColor} scoreBg={scoreBg} last={i === dims.length - 1} />
              ))}
            </div>
          </div>

          {/* Investor notes */}
          <div style={{ marginBottom: 48 }}>
            <div style={{ fontSize: 11, fontWeight: 500, color: '#888', letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 12 }}>Your Notes</div>
            <textarea
              value={finalNote}
              onChange={e => setFinalNote(e.target.value)}
              onFocus={() => setNoteExpanded(true)}
              onBlur={() => !finalNote && setNoteExpanded(false)}
              placeholder="Add your overall investment thesis notes…"
              rows={noteExpanded || finalNote ? 5 : 2}
              style={{ width: '100%', fontSize: 14, color: '#0D0D0D', background: '#fff', border: '1px solid #E0E0E0', borderRadius: 4, padding: '14px 16px', lineHeight: 1.6, transition: 'all 200ms' }}
            />
            {finalNote && <div style={{ fontSize: 11, color: '#B4FFB6', background: '#0D0D0D', display: 'inline-block', borderRadius: 3, padding: '3px 8px', marginTop: 6, fontWeight: 500 }}>Auto-saved</div>}
          </div>

          {/* Footer actions */}
          <div style={{ display: 'flex', gap: 12, paddingTop: 24, borderTop: '1px solid #E0E0E0' }}>
            <GhostBtn onClick={onBack}>← Back to Deck</GhostBtn>
            <MintBtn>Export Report</MintBtn>
          </div>
        </div>
      </div>
    </div>
  );
}

function DimensionRow({ dim, scoreColor, scoreBg, last }) {
  const pct = dim.score;

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '110px 1fr 100px', gap: 16, alignItems: 'center', borderBottom: last ? 'none' : '1px solid #F0F0F0', padding: '14px 0' }}>
      {/* Label + score */}
      <div>
        <div style={{ fontSize: 14, fontWeight: 500, color: '#0D0D0D' }}>{dim.label}</div>
        <div style={{ fontSize: 20, fontWeight: 600, color: '#0D0D0D', letterSpacing: '-0.02em', marginTop: 2 }}>{dim.score}</div>
      </div>

      {/* Bar + rationale */}
      <div>
        <div style={{ height: 4, background: '#F0F0F0', borderRadius: 2, marginBottom: 8, overflow: 'hidden' }}>
          <div style={{ width: `${pct}%`, height: '100%', background: scoreBg(pct), borderRadius: 2, transition: 'width 600ms' }} />
        </div>
        <div style={{ fontSize: 12, color: '#888', lineHeight: 1.5 }}>{dim.rationale}</div>
      </div>

      {/* Score badge */}
      <div style={{ textAlign: 'right' }}>
        <span style={{ fontSize: 11, fontWeight: 600, color: scoreColor(pct), background: scoreBg(pct), borderRadius: 3, padding: '3px 9px' }}>{pct >= 75 ? 'Strong' : pct >= 55 ? 'Moderate' : 'Weak'}</span>
      </div>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────

function App() {
  const [screen, setScreen] = React.useState(() => localStorage.getItem('innovia_screen') || 'dashboard');
  const [selectedDeal, setSelectedDeal] = React.useState(null);
  const [deals, setDeals] = React.useState(DEALS);
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('innovia_screen', screen); }, [screen]);

  // Tweaks protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const goToReview = (deal) => { setSelectedDeal(deal); setScreen('review'); };
  const afterUpload = () => {
    const newDeal = { id: 99, company: 'New Company', sector: 'Unknown', stage: 'Seed', uploaded: 'Apr 18, 2026', status: 'in_review', score: null };
    setDeals(prev => [newDeal, ...prev]);
    setSelectedDeal(newDeal);
    setScreen('review');
  };

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', position: 'relative' }}>
      {screen === 'dashboard' && <DashboardScreen deals={deals} onSelectDeal={goToReview} onUpload={() => setScreen('upload')} tweaks={tweaks} />}
      {screen === 'upload' && <UploadScreen onComplete={afterUpload} />}
      {screen === 'review' && <DealReviewScreen deal={selectedDeal || DEALS[0]} observations={OBSERVATIONS} onScore={() => setScreen('score')} onDashboard={() => setScreen('dashboard')} tweaks={tweaks} />}
      {screen === 'score' && <ScoreSummaryScreen deal={selectedDeal || DEALS[0]} onBack={() => setScreen('review')} tweaks={tweaks} />}

      {/* Tweaks panel */}
      {tweaksVisible && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, background: '#fff', border: '1px solid #E0E0E0', borderRadius: 4, padding: 20, width: 260, zIndex: 1000, boxShadow: '0 4px 20px rgba(0,0,0,0.08)' }}>
          <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#888', marginBottom: 16 }}>Tweaks</div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <label style={{ fontSize: 12, color: '#444', display: 'block', marginBottom: 6 }}>Accent Color</label>
              <div style={{ display: 'flex', gap: 8 }}>
                {['#B4FFB6', '#A8D8FF', '#FFD6A5', '#E8C6FF'].map(c => (
                  <div key={c} onClick={() => updateTweak('accentColor', c)}
                    style={{ width: 28, height: 28, background: c, borderRadius: 3, cursor: 'pointer', border: tweaks.accentColor === c ? '2px solid #0D0D0D' : '2px solid transparent', transition: 'border 150ms' }} />
                ))}
              </div>
            </div>

            <div>
              <label style={{ fontSize: 12, color: '#444', display: 'block', marginBottom: 6 }}>Layout Density</label>
              <div style={{ display: 'flex', gap: 6 }}>
                {['comfortable', 'compact'].map(d => (
                  <button key={d} onClick={() => updateTweak('density', d)}
                    style={{ fontSize: 12, padding: '5px 12px', border: `1px solid ${tweaks.density === d ? '#0D0D0D' : '#E0E0E0'}`, borderRadius: 3, background: tweaks.density === d ? '#0D0D0D' : '#fff', color: tweaks.density === d ? '#fff' : '#444', cursor: 'pointer' }}>
                    {d}
                  </button>
                ))}
              </div>
            </div>

            <div>
              <label style={{ fontSize: 12, color: '#444', display: 'block', marginBottom: 6 }}>Current Screen</label>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                {[['dashboard','Dashboard'],['upload','Upload'],['review','Deal Review'],['score','Score Summary']].map(([s,l]) => (
                  <button key={s} onClick={() => setScreen(s)}
                    style={{ fontSize: 12, padding: '5px 10px', border: `1px solid ${screen === s ? '#0D0D0D' : '#E0E0E0'}`, borderRadius: 3, background: screen === s ? '#0D0D0D' : '#fff', color: screen === s ? '#fff' : '#444', cursor: 'pointer', textAlign: 'left' }}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
